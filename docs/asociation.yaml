  /v1/actividades:
    get:
      summary: Devuelve lista de actividades
      description: |
        Devuelve una lista de todos las actividades que están anunciadas en la asociacion
        se permite filtrar por 3 campos simultáneamente: 
          -duration
          -canJoin
          -dayActivity
      parameters:
        - name: duration
          in: query
          description: Filtro por la duración
          required: false
          schema:
            type: number
            format: float
          example:
            minimum:
              value: 0
        - name: canJoin
          in: query
          description: Filtro por si es posible apuntarse o no
          required: false
          schema:
            type: boolean
          example:
            value: true, false

        - name: dayActivity
          in: query
          description: Filtro por fecha de dia (filtra todos las que sucedan ese día)
          required: false
          schema:
            type: string
            format: date
          example:
            value: 2026-03-03
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ActividadOutDto'
              example:
                type: array
                Example1:
                  $ref: '#/components/examples/actividadExample1'
                Example2:
                  $ref: '#/components/examples/actividadExample2'
        404:
          description: Actividad no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError 404'
        500:
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerError 500'
    post:
      summary: Sube una nueva actividad
      description: Añadir nueva actividad al registro
      requestBody:
        description: Datos de actividad
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActividadDto'
            examples:
              Example1:
                $ref: '#/components/examples/actividadExample1'
              Example2:
                $ref: '#/components/examples/actividadExample2'
              Badcase:
                $ref: '#/components/examples/actividadExampleBad'
      responses:
        201:
          description: Actividad creada
          content:
            application/json:
              schema:
