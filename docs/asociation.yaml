  /v1/participantes:
    get:
      summary: Devuelve lista de participantes
      description: |
        Devuelve una lista de todos los participantes miembros de la asociacion
        se permite filtrar por 3 campos simultáneamente: 
          -typeRel
          -name
          -birthDate
      parameters:
        - name: typeRel
          in: query
          description: Filtro por tipo de relación
          required: false
          schema:
            type: string
          example: cónjuge
        - name: name
          in: query
          description: Filtro por nombre (iniciales)
          required: false
          schema:
            type: string
          example: Juanjo
        - name: birthDate
          in: query
          description: Filtro por fecha de nacimiento (filtra todos los que nacieron después)
          required: false
          schema:
            type: string
            format: date
          example: 1983-12-04
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParticipanteOutDto'
              examples:
                CasoÉxito1:
                  $ref: '#/components/examples/participanteExample1'
                CasoÉxito2:
